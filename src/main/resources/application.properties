spring.application.name=Laptop_Shop_Spring_MVC_project

# ===============================
# AIVEN CLOUD DATABASE CONFIGURATION
# ===============================
spring.datasource.url=jdbc:mysql://mysql-18f29867-prathmeshshop.e.aivencloud.com:15573/laptop_db?ssl-mode=REQUIRED
spring.datasource.username=avnadmin
spring.datasource.password=${AIVEN_DB_PASSWORD}

# ===============================
# JPA / HIBERNATE CONFIGURATION
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ===============================
# MVC VIEW RESOLVER (JSP PATH)
# ===============================
spring.mvc.view.prefix=/WEB-INF/views/
spring.mvc.view.suffix=.jsp

# Server port will be automatically handled by Render (Default 8080)